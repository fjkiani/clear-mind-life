services:
  # ── FastAPI Backend ──────────────────────────────────────────────────────────
  - type: web
    name: clear-mind-api
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: free
    envVars:
      - key: APP_ENV
        value: production
      - key: CORS_ORIGINS
        sync: false
      - key: VIDEOSDK_API_KEY
        sync: false
      - key: VIDEOSDK_SECRET_KEY
        sync: false
      - key: ASSEMBLYAI_API_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_MODEL
        value: gpt-4o-mini
    healthCheckPath: /health
